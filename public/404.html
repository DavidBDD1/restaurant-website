<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seite nicht gefunden – Bella Italia</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="flag-bar">
    <div class="green"></div>
    <div class="white"></div>
    <div class="red"></div>
  </div>

  <nav>
    <a href="index.html" class="logo">Bella <span>Italia</span></a>
    <div class="nav-links">
      <a href="index.html">Startseite</a>
      <a href="menu.html">Speisekarte</a>
      <a href="reservation.html">Reservation</a>
    </div>
  </nav>

  <div class="error-page">
    <div class="error-number">404</div>
    <h1 class="error-title">Questa pagina non esiste</h1>
    <p class="error-sub">Diese Seite wurde nicht gefunden – aber unser Restaurant schon!</p>
    <div class="error-divider">✦</div>

    <div class="error-links">
      <a href="index.html" class="error-link">
        <span class="error-link-icon">🏠</span>
        <span class="error-link-text">Startseite</span>
      </a>
      <a href="menu.html" class="error-link">
        <span class="error-link-icon">🍝</span>
        <span class="error-link-text">Speisekarte</span>
      </a>
      <a href="reservation.html" class="error-link">
        <span class="error-link-icon">📅</span>
        <span class="error-link-text">Reservation</span>
      </a>
    </div>
    <a href="index.html" class="btn" style="margin-top: 2.5rem; display: inline-block;">Zurück zur Startseite</a>
  </div>

  <footer>
    <div class="footer-logo">Bella <span>Italia</span></div>
    <div class="footer-flag">
      <div class="green"></div>
      <div class="white"></div>
      <div class="red"></div>
    </div>
    <div>© 2025 Bella Italia · Luzern</div>
  </footer>

</body>
</html>
